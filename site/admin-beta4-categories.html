<!doctype html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>BALI Admin — Content Demo</title><style>*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;background:#080a0a;color:#fff;font-family:Inter,system-ui,sans-serif;overflow:hidden}body{display:grid;grid-template-rows:58px 1fr}.demo-admin-bar{display:flex;align-items:center;gap:9px;padding:8px 12px;border-bottom:1px solid #ffffff17;background:#0d110f}.demo-brand{display:flex;align-items:center;gap:8px;min-width:190px}.demo-logo{width:38px;height:38px;display:grid;place-items:center;border-radius:12px;background:#c8ff3d;color:#080a0a;font-weight:950;font-size:20px}.demo-brand strong{display:block;font-size:12px}.demo-brand small{display:block;margin-top:2px;color:#909a94;font-size:8px}.demo-controls{display:flex;align-items:center;gap:7px;flex:1}.demo-controls label{display:flex;align-items:center;gap:6px;color:#aab3ad;font-size:9px;font-weight:800}.demo-controls select,.demo-controls button,.demo-controls a{min-height:38px;padding:0 10px;border:1px solid #ffffff17;border-radius:10px;background:#171c19;color:#fff;font:800 9px Inter,system-ui;text-decoration:none}.demo-controls select{min-width:210px}.demo-controls .primary{border-color:#c8ff3d;background:#c8ff3d;color:#080a0a}.demo-controls .danger{color:#ff9b9b}.demo-note{margin-left:auto;color:#929c96;font-size:8px;white-space:nowrap}iframe{width:100%;height:100%;margin:0;border:0;background:#080a0a}@media(max-width:760px){body{grid-template-rows:auto 1fr}.demo-admin-bar{align-items:flex-start;flex-wrap:wrap}.demo-brand{min-width:0;flex:1}.demo-controls{order:3;width:100%;display:grid;grid-template-columns:1fr 1fr}.demo-controls label{grid-column:1/-1}.demo-controls select{width:100%;min-width:0}.demo-note{display:none}}</style><script src="./demo-seed.js?v=beta4-admin-content-2"></script><script src="./demo-live-sync.js?v=beta4-admin-content-2"></script></head><body><header class="demo-admin-bar"><div class="demo-brand"><div class="demo-logo">B</div><div><strong>BALI ADMIN DEMO</strong><small>СОБЫТИЯ · АРТИСТЫ · ПЛОЩАДКА · ОТЗЫВЫ</small></div></div><div class="demo-controls"><label>Активный гость <select id="demoUser"></select></label><a class="primary" href="./beta4-stable.html?v=bali-reviews-likes-invites-4-final" target="_blank">Открыть пользователя ↗</a><button id="reloadAdmin" type="button">Обновить админку</button><button class="danger" id="resetDemo" type="button">Сбросить демо</button></div><span class="demo-note">Изменения сохраняются в браузере</span></header><iframe id="admin" src="./admin-beta4.html?v=beta4-admin-content-2&demo=1&build=content2"></iframe><script>(()=>{const demo=window.BaliDemo,select=document.getElementById("demoUser"),frame=document.getElementById("admin");const fill=()=>{select.innerHTML=demo.users.map(user=>{const live=user.key===demo.activeUser().key?demo.activeUser():user;return `<option value="${user.key}">${user.name} · ${live.balance} баллов</option>`}).join("");select.value=demo.activeUser().key};fill();select.addEventListener("change",()=>{demo.selectUser(select.value);fill()});document.getElementById("reloadAdmin").addEventListener("click",()=>frame.contentWindow?.location.reload());document.getElementById("resetDemo").addEventListener("click",()=>{if(!confirm("Вернуть исходные тестовые данные BALI?"))return;demo.reset();localStorage.removeItem("bali_event_content_demo_seed_v1");localStorage.removeItem("bali_venue_content_v1");localStorage.removeItem("bali_reviews_v1");fill();frame.src=`./admin-beta4.html?v=beta4-admin-content-2&demo=1&build=content2&t=${Date.now()}`});})();</script></body></html>
