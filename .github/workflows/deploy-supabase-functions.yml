name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-supabase-functions.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-functions-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: zusoprnxqohoeonaqwiv
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify deployment secret
        shell: bash
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Repository secret SUPABASE_ACCESS_TOKEN is missing. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Deploy BALI People
        run: supabase functions deploy telegram-social-profile --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt

      - name: Deploy QR check-in
        run: supabase functions deploy event-checkin-production --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt

      - name: Deploy loyalty actions
        run: supabase functions deploy loyalty-action --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
