name: Demo smoke checks

on:
  push:
    branches: [main]
    paths:
      - "site/demo-*.js"
      - "site/beta4-stable.html"
      - "site/beta4-square-loader.js"
      - "site/config.js"
      - "site/legacy-nav-final-beta4.css"
      - "site/legacy-nav-final-beta4.js"
      - "site/legacy-event-attendance-beta4.js"
      - "site/profile-full-restore-beta4.js"
      - "site/profile-controls-final-beta4.js"
      - "site/beta4-profile-v2.js"
      - "site/profile-demographics-beta4.js"
      - "site/profile-recent-rewards-beta4.js"
      - "site/vip-duration-options-beta4.js"
      - "site/beta4-loyalty-ui-stable.js"
      - "site/chip-requests-user-beta4.js"
      - "site/beta4-qr-checkin.js"
      - "site/event-qr-attendance-beta4.js"
      - "site/night-crown-*.js"
      - "site/bali-people-*.js"
      - "site/beta4-social-core.js"
      - "site/beta4-social-page.js"
      - "site/crown-win-cards-beta4.js"
      - "site/beta4-home-links.js"
      - "site/beta4-home-design.js"
      - "site/home-layout-final-beta4.js"
      - "site/admin-beta4.html"
      - "site/admin-beta4-categories.html"
      - "site/admin-mobile-runtime.js"
      - "site/admin-booking-manager-beta4.js"
      - "site/admin-bonuses-final-beta4.js"
      - "site/admin-customer-dossier-beta4.js"
      - "site/admin-user-card-links-beta4.js"
      - "tests/*.mjs"
      - ".github/workflows/demo-smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Check JavaScript syntax
        run: |
          node --check site/demo-seed.js
          node --check site/demo-live-sync.js
          node --check site/demo-user-toolbar.js
          node --check site/demo-admin-toolbar.js
          node --check site/beta4-square-loader.js
          node --check site/config.js
          node --check site/legacy-nav-final-beta4.js
          node --check site/legacy-event-attendance-beta4.js
          node --check site/profile-full-restore-beta4.js
          node --check site/profile-controls-final-beta4.js
          node --check site/beta4-profile-v2.js
          node --check site/profile-demographics-beta4.js
          node --check site/profile-recent-rewards-beta4.js
          node --check site/vip-duration-options-beta4.js
          node --check site/beta4-loyalty-ui-stable.js
          node --check site/chip-requests-user-beta4.js
          node --check site/event-qr-attendance-beta4.js
          node --check site/beta4-qr-checkin.js
          node --check site/night-crown-core-beta4.js
          node --check site/night-crown-cloud-beta4.js
          node --check site/night-crown-presence-fix-beta4.js
          node --check site/night-crown-vote-lock-beta4.js
          node --check site/beta4-social-core.js
          node --check site/beta4-social-page.js
          node --check site/bali-people-status-sync-beta4.js
          node --check site/bali-people-search-ranking-beta4.js
          node --check site/bali-people-public-cards-beta4.js
          node --check site/bali-people-vip-frame-beta4.js
          node --check site/crown-win-cards-beta4.js
          node --check site/bali-people-crown-frame-beta4.js
          node --check site/beta4-home-links.js
          node --check site/beta4-home-design.js
          node --check site/home-layout-final-beta4.js
          node --check site/admin-booking-manager-beta4.js
          node --check site/admin-bonuses-final-beta4.js
          node --check site/admin-customer-dossier-beta4.js
          node --check site/admin-user-card-links-beta4.js
      - name: Run demo data smoke test
        run: node tests/demo-smoke.mjs
      - name: Run full user application smoke test
        run: node tests/bottom-nav-smoke.mjs
      - name: Run compact profile smoke test
        run: node tests/profile-compact-smoke.mjs
      - name: Run admin booking manager smoke test
        run: node tests/admin-booking-manager-smoke.mjs
      - name: Run crown and active event smoke test
        run: node tests/crown-live-event-smoke.mjs
      - name: Run final admin and BALI People smoke test
        run: node tests/final-admin-people-smoke.mjs
      - name: Run final home and discovery layout smoke test
        run: node tests/home-people-layout-smoke.mjs
