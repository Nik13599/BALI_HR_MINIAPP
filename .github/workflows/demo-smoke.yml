name: Demo smoke checks

on:
  push:
    branches: [main]
    paths:
      - "site/demo-*.js"
      - "site/beta4-stable.html"
      - "site/beta4-square-loader.js"
      - "site/legacy-nav-final-beta4.css"
      - "site/legacy-nav-final-beta4.js"
      - "site/legacy-event-attendance-beta4.js"
      - "site/profile-full-restore-beta4.js"
      - "site/beta4-profile-v2.js"
      - "site/beta4-loyalty-ui-stable.js"
      - "site/chip-requests-user-beta4.js"
      - "site/admin-beta4.html"
      - "site/admin-beta4-categories.html"
      - "site/admin-booking-manager-beta4.js"
      - "tests/demo-smoke.mjs"
      - "tests/bottom-nav-smoke.mjs"
      - "tests/admin-booking-manager-smoke.mjs"
      - ".github/workflows/demo-smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Check JavaScript syntax
        run: |
          node --check site/demo-seed.js
          node --check site/demo-live-sync.js
          node --check site/demo-user-toolbar.js
          node --check site/demo-admin-toolbar.js
          node --check site/beta4-square-loader.js
          node --check site/legacy-nav-final-beta4.js
          node --check site/legacy-event-attendance-beta4.js
          node --check site/profile-full-restore-beta4.js
          node --check site/beta4-profile-v2.js
          node --check site/beta4-loyalty-ui-stable.js
          node --check site/chip-requests-user-beta4.js
          node --check site/admin-booking-manager-beta4.js
      - name: Run demo data smoke test
        run: node tests/demo-smoke.mjs
      - name: Run full user application smoke test
        run: node tests/bottom-nav-smoke.mjs
      - name: Run admin booking manager smoke test
        run: node tests/admin-booking-manager-smoke.mjs
