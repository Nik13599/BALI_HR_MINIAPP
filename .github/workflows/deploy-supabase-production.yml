name: Deploy Supabase production

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/**"
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-supabase-production.yml"

permissions:
  contents: read

concurrency:
  group: supabase-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: zusoprnxqohoeonaqwiv
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_WEBAPP_URL: https://nik13599.github.io/BALI_HR_MINIAPP/site/?v=bali-production-25
      TELEGRAM_BOT_USERNAME: BaliMinskAppBot

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required deployment secrets
        shell: bash
        run: |
          set -euo pipefail
          for name in SUPABASE_ACCESS_TOKEN TELEGRAM_BOT_TOKEN; do
            if [ -z "${!name:-}" ]; then
              echo "Missing GitHub Actions secret: $name"
              exit 1
            fi
          done

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest
          github-token: ${{ github.token }}

      - name: Apply database migrations
        if: ${{ env.SUPABASE_DB_PASSWORD != '' }}
        shell: bash
        run: |
          set -euo pipefail
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
          supabase db push --include-all --password "$SUPABASE_DB_PASSWORD"

      - name: Report missing database password
        if: ${{ env.SUPABASE_DB_PASSWORD == '' }}
        shell: bash
        run: |
          echo "::warning::SUPABASE_DB_PASSWORD is not configured. Edge Functions will deploy, but database migrations cannot be applied automatically."

      - name: Generate Telegram webhook secret
        shell: bash
        run: |
          set -euo pipefail
          echo "TELEGRAM_WEBHOOK_SECRET=$(openssl rand -hex 32)" >> "$GITHUB_ENV"

      - name: Store Telegram secrets in Supabase
        shell: bash
        run: |
          set -euo pipefail
          supabase secrets set \
            TELEGRAM_BOT_TOKEN="$TELEGRAM_BOT_TOKEN" \
            TELEGRAM_WEBHOOK_SECRET="$TELEGRAM_WEBHOOK_SECRET" \
            TELEGRAM_WEBAPP_URL="$TELEGRAM_WEBAPP_URL" \
            TELEGRAM_BOT_USERNAME="$TELEGRAM_BOT_USERNAME" \
            --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy all Edge Functions
        shell: bash
        run: |
          set -euo pipefail
          supabase functions deploy --use-api --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions list --project-ref "$SUPABASE_PROJECT_REF"

      - name: Configure Telegram webhook and Mini App button
        shell: bash
        run: |
          set -euo pipefail
          WEBHOOK_URL="https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/telegram-webhook"

          curl --fail-with-body --silent --show-error \
            --request POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook" \
            --header "Content-Type: application/json" \
            --data "$(jq -n \
              --arg url "$WEBHOOK_URL" \
              --arg secret "$TELEGRAM_WEBHOOK_SECRET" \
              '{url:$url,secret_token:$secret,allowed_updates:["message","edited_message"],drop_pending_updates:false}')"

          curl --fail-with-body --silent --show-error \
            --request POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setMyCommands" \
            --header "Content-Type: application/json" \
            --data '{"commands":[{"command":"start","description":"Открыть BALI и написать администрации"}]}'

          curl --fail-with-body --silent --show-error \
            --request POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setChatMenuButton" \
            --header "Content-Type: application/json" \
            --data "$(jq -n --arg url "$TELEGRAM_WEBAPP_URL" '{menu_button:{type:"web_app",text:"Открыть BALI",web_app:{url:$url}}}')"

          echo
          echo "Webhook info:"
          curl --fail-with-body --silent --show-error \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getWebhookInfo" | jq '{ok,result:{url,pending_update_count,last_error_date,last_error_message}}'
